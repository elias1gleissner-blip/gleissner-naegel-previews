<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHULMAYR & BERCHTOLD GbR – Elektriker in Dachau</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #3898EC;
    --accent: #0082F3;
    --dark: #0d1117;
    --dark2: #161b22;
    --dark3: #21262d;
    --text: #e6edf3;
    --muted: #8b949e;
    --light-bg: #f0f6ff;
    --white: #ffffff;
    --border: #30363d;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ══════════════════════════════════════
     INFO BAR
  ══════════════════════════════════════ */
  .info-bar {
    background: #0a0e13;
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--muted);
    overflow: hidden;
    white-space: nowrap;
  }
  .info-bar-inner {
    display: flex;
    align-items: center;
    gap: 32px;
    padding: 0 24px;
    max-width: 1400px;
    margin: 0 auto;
    flex-wrap: wrap;
  }
  .info-bar span { display: flex; align-items: center; gap: 6px; }
  .info-bar .tag {
    background: var(--primary);
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .info-bar a { color: var(--primary); text-decoration: none; }

  /* ══════════════════════════════════════
     WATERMARK BANNER
  ══════════════════════════════════════ */
  .watermark-banner {
    background: linear-gradient(90deg, #1a0a2e, #0f1a3a, #1a0a2e);
    border-bottom: 2px solid var(--accent);
    padding: 10px 24px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: #a0b4d0;
    letter-spacing: 0.05em;
    position: relative;
    overflow: hidden;
  }
  .watermark-banner::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(56,152,236,0.08), transparent);
    animation: shimmer 3s infinite linear;
  }
  @keyframes shimmer { to { left: 200%; } }
  .watermark-banner strong { color: var(--primary); }

  /* ══════════════════════════════════════
     HEADER
  ══════════════════════════════════════ */
  .header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(13,17,23,0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
  }
  .header-inner {
    max-width: 1300px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }
  .logo-placeholder {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 18px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(56,152,236,0.35);
  }
  .logo-text {
    line-height: 1.15;
  }
  .logo-text .line1 {
    font-size: 13px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 0.02em;
  }
  .logo-text .line2 {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  nav { display: flex; align-items: center; gap: 6px; }
  nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  nav a:hover { color: var(--white); background: rgba(56,152,236,0.1); }
  .nav-cta {
    background: var(--primary) !important;
    color: #fff !important;
    font-weight: 600 !important;
    padding: 9px 20px !important;
    border-radius: 8px !important;
    margin-left: 8px;
    box-shadow: 0 0 20px rgba(56,152,236,0.3);
    transition: all 0.2s !important;
  }
  .nav-cta:hover { background: #2d7dd6 !important; box-shadow: 0 0 30px rgba(56,152,236,0.5) !important; transform: translateY(-1px) !important; }

  /* ══════════════════════════════════════
     HERO
  ══════════════════════════════════════ */
  .hero {
    position: relative;
    min-height: 90vh;
    display: flex;
    align-items: center;
    overflow: hidden;
    background: #0a0e13;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 60% 40%, rgba(0,130,243,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 10% 80%, rgba(56,152,236,0.08) 0%, transparent 50%),
      linear-gradient(160deg, #0a0e13 0%, #0d1117 50%, #0a1628 100%);
  }
  /* Electric grid pattern */
  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,152,236,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,152,236,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }
  /* Lightning bolt decorative SVG */
  .hero-lightning {
    position: absolute;
    right: 5%;
    top: 50%;
    transform: translateY(-50%);
    width: 420px;
    height: 420px;
    opacity: 0.07;
  }
  .hero-lightning-glow {
    position: absolute;
    right: 8%;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(56,152,236,0.25) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(40px);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1300px;
    margin: 0 auto;
    padding: 80px 40px;
    width: 100%;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(56,152,236,0.12);
    border: 1px solid rgba(56,152,236,0.3);
    color: var(--primary);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .hero-badge::before { content: '⚡'; font-size: 14px; }
  .hero h1 {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: clamp(42px, 6vw, 82px);
    font-weight: 700;
    line-height: 1.05;
    color: var(--white);
    max-width: 700px;
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero-sub {
    font-size: 18px;
    color: var(--muted);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 40px;
    font-weight: 400;
  }
  .hero-buttons { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--primary);
    color: #fff;
    padding: 16px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 30px rgba(56,152,236,0.4);
    transition: all 0.25s;
    border: none;
    cursor: pointer;
  }
  .btn-primary:hover { background: #2d7dd6; transform: translateY(-2px); box-shadow: 0 8px 40px rgba(56,152,236,0.5); }
  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--text);
    padding: 16px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    border: 1px solid var(--border);
    transition: all 0.25s;
    cursor: pointer;
  }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); background: rgba(56,152,236,0.05); transform: translateY(-2px); }
  .hero-stats {
    display: flex;
    gap: 48px;
    margin-top: 64px;
    flex-wrap: wrap;
  }
  .hero-stat .num {
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .hero-stat .label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ══════════════════════════════════════
     FLOATING CTAs
  ══════════════════════════════════════ */
  .floating-ctas {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 900;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .float-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
    transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    letter-spacing: 0.02em;
    overflow: hidden;
    max-width: 52px;
  }
  .float-btn:hover { max-width: 220px; }
  .float-btn .icon { flex-shrink: 0; font-size: 18px; }
  .float-btn .text { opacity: 0; transition: opacity 0.2s 0.05s; white-space: nowrap; }
  .float-btn:hover .text { opacity: 1; }
  .float-call { background: var(--primary); color: #fff; box-shadow: 0 4px 24px rgba(56,152,236,0.45); }
  .float-call:hover { background: #2d7dd6; box-shadow: 0 8px 32px rgba(56,152,236,0.6); }
  .float-mail { background: var(--dark2); color: var(--text); border: 1px solid var(--border); }
  .float-mail:hover { background: var(--dark3); border-color: var(--muted); }

  /* ══════════════════════════════════════
     SECTIONS GENERAL
  ══════════════════════════════════════ */
  section { padding: 100px 40px; }
  .container { max-width: 1200px; margin: 0 auto; }
  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 16px;
  }
  .section-tag::before { content: ''; display: block; width: 24px; height: 2px; background: var(--primary); }
  .section-h2 {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 700;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 20px;
  }
  .section-h2 .accent { color: var(--accent); }
  .section-sub {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.75;
    max-width: 560px;
  }

  /* ══════════════════════════════════════
     ÜBER UNS
  ══════════════════════════════════════ */
  .about { background: var(--dark2); }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .about-visual {
    position: relative;
  }
  .about-img-box {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #0d1828 0%, #0f2040 50%, #0a1628 100%);
    border-radius: 20px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .about-img-box-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: var(--muted);
  }
  .about-icon-big {
    font-size: 80px;
    opacity: 0.3;
  }
  .about-circuit {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,152,236,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,152,236,0.06) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .about-badge-float {
    position: absolute;
    bottom: -20px;
    right: -20px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff;
    padding: 20px 24px;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(56,152,236,0.4);
    text-align: center;
  }
  .about-badge-float .big { font-size: 28px; font-weight: 800; line-height: 1; }
  .about-badge-float .small { font-size: 11px; font-weight: 600; opacity: 0.85; margin-top: 4px; letter-spacing: 0.04em; }
  .about-content { }
  .about-text {
    font-size: 16px;
    color: #9ba8b8;
    line-height: 1.8;
    margin-bottom: 16px;
  }
  .about-highlights {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 32px;
  }
  .highlight-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px;
    background: rgba(56,152,236,0.05);
    border: 1px solid rgba(56,152,236,0.12);
    border-radius: 12px;
    transition: all 0.2s;
  }
  .highlight-item:hover { background: rgba(56,152,236,0.1); border-color: rgba(56,152,236,0.25); }
  .highlight-item .hi-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .highlight-item .hi-text .title { font-size: 14px; font-weight: 600; color: var(--white); }
  .highlight-item .hi-text .desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ══════════════════════════════════════
     LEISTUNGEN
  ══════════════════════════════════════ */
  .services { background: var(--dark); }
  .services-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 60px;
    gap: 32px;
    flex-wrap: wrap;
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .service-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 28px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(56,152,236,0.06), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .service-card:hover {
    border-color: rgba(56,152,236,0.4);
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(56,152,236,0.15);
  }
  .service-card:hover::before { opacity: 1; }
  .sc-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, rgba(56,152,236,0.2), rgba(0,130,243,0.1));
    border: 1px solid rgba(56,152,236,0.25);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
    transition: all 0.3s;
  }
  .service-card:hover .sc-icon {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-color: transparent;
    box-shadow: 0 0 20px rgba(56,152,236,0.5);
  }
  .sc-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .sc-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    position: relative;
    z-index: 1;
  }
  .sc-arrow {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 14px;
    transition: all 0.3s;
    z-index: 1;
  }
  .service-card:hover .sc-arrow {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  /* ══════════════════════════════════════
     WHY US
  ══════════════════════════════════════ */
  .why { background: var(--dark2); }
  .why-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .why-list {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-top: 40px;
  }
  .why-item {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .why-num {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, rgba(56,152,236,0.15), rgba(0,130,243,0.08));
    border: 1px solid rgba(56,152,236,0.25);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--primary);
    flex-shrink: 0;
  }
  .why-text .wt { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
  .why-text .wd { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .why-visual {
    background: linear-gradient(135deg, #0d1828, #0f2040);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .why-visual::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at center, rgba(56,152,236,0.08) 0%, transparent 50%);
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(0.9); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 1; }
  }
  .why-big-icon { font-size: 80px; display: block; margin-bottom: 24px; position: relative; z-index: 1; }
  .why-tagline {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }
  .why-tagline .accent { color: var(--accent); }
  .why-sub-text {
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  /* ══════════════════════════════════════
     KONTAKT
  ══════════════════════════════════════ */
  .contact { background: var(--dark); }
  .contact-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 60px;
    align-items: start;
  }
  .contact-form-box {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
  }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    outline: none;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(56,152,236,0.12);
  }
  .form-group textarea { height: 120px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .contact-info { display: flex; flex-direction: column; gap: 24px; }
  .contact-info-header { margin-bottom: 8px; }
  .contact-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    align-items: flex-start;
    gap: 18px;
    transition: all 0.2s;
  }
  .contact-card:hover { border-color: rgba(56,152,236,0.3); }
  .cc-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(56,152,236,0.3);
  }
