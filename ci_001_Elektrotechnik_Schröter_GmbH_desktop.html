<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektrotechnik Schröter GmbH – Ihr Elektriker in Fürstenfeldbruck</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #003D89;
    --primary-dark: #002d66;
    --primary-light: #0050b3;
    --accent: #65BC7B;
    --accent-dark: #4da066;
    --dark: #111827;
    --gray-900: #1f2937;
    --gray-700: #374151;
    --gray-500: #6b7280;
    --gray-200: #e5e7eb;
    --gray-100: #f3f4f6;
    --white: #ffffff;
  }

  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; color: var(--dark); background: var(--white); overflow-x: hidden; }

  /* ── INFO BAR ── */
  .info-bar {
    background: #0a0f1e;
    color: #94a3b8;
    font-size: 11.5px;
    font-weight: 500;
    padding: 7px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    letter-spacing: 0.3px;
    z-index: 1000;
    position: relative;
  }
  .info-bar span { white-space: nowrap; }
  .info-bar .rating { color: #f59e0b; font-weight: 700; }
  .info-bar a { color: var(--accent); text-decoration: none; }
  .info-bar a:hover { text-decoration: underline; }

  /* ── WATERMARK ── */
  .watermark-bar {
    background: repeating-linear-gradient(
      -45deg,
      #1a0533,
      #1a0533 18px,
      #220a3e 18px,
      #220a3e 36px
    );
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    padding: 6px 24px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    position: relative;
    z-index: 999;
  }
  .watermark-bar span { background: rgba(0,0,0,0.35); padding: 2px 14px; border-radius: 30px; }

  /* ── HEADER ── */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 900;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: 0 2px 20px rgba(0,61,137,0.08);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .logo-placeholder {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 18px;
    color: white;
    letter-spacing: -1px;
    box-shadow: 0 4px 14px rgba(0,61,137,0.3);
  }
  .logo-text { line-height: 1.2; }
  .logo-text strong { display: block; font-size: 15px; font-weight: 800; color: var(--primary); }
  .logo-text small { font-size: 11px; color: var(--gray-500); font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; }

  nav { display: flex; align-items: center; gap: 4px; }
  nav a {
    color: var(--gray-700);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  nav a:hover { color: var(--primary); background: rgba(0,61,137,0.06); }
  .nav-cta {
    background: var(--primary) !important;
    color: white !important;
    padding: 9px 20px !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    margin-left: 8px;
    transition: all 0.2s !important;
    box-shadow: 0 2px 10px rgba(0,61,137,0.25);
  }
  .nav-cta:hover { background: var(--primary-dark) !important; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,61,137,0.35) !important; }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 88vh;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://www.elektrotechnik-ffb.de/wp-content/uploads/2024/05/header-schroeter.jpg');
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
    transform: scale(1.03);
    transition: transform 8s ease;
  }
  .hero:hover .hero-bg { transform: scale(1.06); }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, rgba(0,20,60,0.88) 0%, rgba(0,40,100,0.7) 50%, rgba(0,61,137,0.3) 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
    width: 100%;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(101,188,123,0.15);
    border: 1px solid rgba(101,188,123,0.4);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 30px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .hero-badge::before { content: '⚡'; font-size: 14px; }
  .hero h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(2.4rem, 5.5vw, 4.2rem);
    font-weight: 900;
    color: white;
    line-height: 1.1;
    margin-bottom: 20px;
    max-width: 700px;
  }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero p {
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: rgba(255,255,255,0.85);
    max-width: 560px;
    line-height: 1.7;
    margin-bottom: 36px;
    font-weight: 400;
  }
  .hero-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 36px;
  }
  .hero-tag {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
    font-size: 12.5px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    backdrop-filter: blur(6px);
  }
  .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--primary);
    color: white;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    padding: 15px 32px;
    border-radius: 10px;
    transition: all 0.25s;
    box-shadow: 0 6px 24px rgba(0,61,137,0.45);
    border: 2px solid var(--primary);
  }
  .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,61,137,0.55); }
  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: white;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    padding: 15px 32px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.5);
    transition: all 0.25s;
    backdrop-filter: blur(6px);
  }
  .btn-outline:hover { background: rgba(255,255,255,0.12); border-color: white; transform: translateY(-2px); }

  .hero-stats {
    position: absolute;
    bottom: 48px;
    right: 32px;
    display: flex;
    gap: 20px;
    z-index: 2;
  }
  .hero-stat {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 16px 22px;
    text-align: center;
    color: white;
  }
  .hero-stat strong { display: block; font-size: 1.8rem; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .hero-stat span { font-size: 11px; opacity: 0.8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── FLOATING CTAs ── */
  .floating-ctas {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 800;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .float-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px 14px 16px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    color: white;
    border-radius: 10px 0 0 10px;
    transition: all 0.3s;
    transform: translateX(calc(100% - 52px));
    box-shadow: -3px 4px 20px rgba(0,0,0,0.25);
    white-space: nowrap;
    overflow: hidden;
  }
  .float-btn:hover { transform: translateX(0); box-shadow: -6px 6px 28px rgba(0,0,0,0.35); }
  .float-btn-phone { background: var(--primary); }
  .float-btn-email { background: var(--gray-900); }
  .float-btn-icon { font-size: 18px; flex-shrink: 0; }

  /* ── SECTIONS ── */
  section { padding: 96px 32px; }
  .container { max-width: 1280px; margin: 0 auto; width: 100%; }
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 12px;
  }
  .section-label::before { content: ''; display: block; width: 24px; height: 2px; background: var(--accent); border-radius: 2px; }
  .section-title {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 900;
    color: var(--dark);
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .section-title em { color: var(--accent); font-style: normal; }
  .section-sub {
    font-size: 1.05rem;
    color: var(--gray-500);
    line-height: 1.7;
    max-width: 600px;
  }

  /* ── TRUST BAR ── */
  .trust-bar { background: var(--primary); padding: 28px 32px; }
  .trust-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
  }
  .trust-icon {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .trust-text strong { display: block; font-size: 14px; font-weight: 700; }
  .trust-text span { font-size: 12px; opacity: 0.75; }

  /* ── ÜBER UNS ── */
  .about { background: var(--white); }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .about-img-wrap { position: relative; }
  .about-img-main {
    width: 100%;
    height: 500px;
    object-fit: cover;
    border-radius: 20px;
    display: block;
    box-shadow: 0 20px 60px rgba(0,61,137,0.15);
  }
  .about-img-accent {
    position: absolute;
    bottom: -28px;
    right: -28px;
    width: 200px;
    height: 160px;
    object-fit: cover;
    border-radius: 14px;
    border: 5px solid white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  }
  .about-badge-float {
    position: absolute;
    top: -18px;
    left: -18px;
    background: var(--accent);
    color: white;
    border-radius: 14px;
    padding: 14px 18px;
    text-align: center;
    box-shadow: 0 8px 28px rgba(101,188,123,0.4);
  }
  .about-badge-float strong { display: block; font-size: 22px; font-weight: 900; line-height: 1; }
  .about-badge-float span { font-size: 11px; font-weight: 600; opacity: 0.9; }
  .about-content { padding: 10px 0; }
  .about-text { font-size: 1rem; color: var(--gray-700); line-height: 1.8; margin-bottom: 18px; }
  .about-features { margin-top: 28px; display: flex; flex-direction: column; gap: 14px; }
  .about-feature {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    background: var(--gray-100);
    border-radius: 10px;
    border-left: 3px solid var(--accent);
  }
  .about-feature-icon { font-size: 20px; margin-top: 1px; flex-shrink: 0; }
  .about-feature-text strong { display: block; font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 2px; }
  .about-feature-text span { font-size: 13px; color: var(--gray-500); }
  .about-cta { margin-top: 32px; }

  /* ── LEISTUNGEN ── */
  .services { background: var(--gray-100); }
  .services-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 56px;
    gap: 24px;
    flex-wrap: wrap;
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .service-card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    transition: all 0.3s;
    border: 1px solid var(--gray-200);
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,61,137,0.12); border-color: transparent; }
  .service-card:hover::before { opacity: 1; }
  .service-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, rgba(0,61,137,0.08) 0%, rgba(101,188,123,0.12) 100%);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 20px;
    transition: all 0.3s;
  }
  .service-card:hover .service-icon { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); transform: scale(1.05); }
  .service-card:hover .service-icon { filter: grayscale(0) brightness(10); }
  .service-card h3 {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 10px;
  }
  .service-card p { font-size: 0.9rem; color: var(--gray-500); line-height: 1.65; }
  .service-tag {
    display: inline-block;
    margin-top: 16px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(101,188,123,0.1);
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* ── GALLERY ── */
  .gallery { background: white; }
  .gallery-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    grid-template-rows: 260px 260px;
    gap: 16px;
    margin-top: 48px;
  }
  .gallery-item {
    overflow: hidden;
    border-radius: 14px;
    position: relative;
    cursor: pointer;
  }
  .gallery-item:first-child { grid-row: 1 / 3; }
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s;
    display: block;
  }
  .gallery-item:hover img { transform: scale(1.06); }
  .gallery-item-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,20,60,0.6) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    padding: 20px;
  }
  .gallery-item:hover .gallery-item-overlay { opacity: 1; }
  .gallery-item-overlay span { color: white; font-size: 13px; font-weight: 600; }

  /* ── CONTACT ── */
  .contact { background: linear-gradient(135deg, #f0f4ff 0%, #e8f5ee 100%); }
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: start;
  }
  .contact-info-cards { display: flex; flex-direction: column; gap: 16px; margin-top: 36px; }
  .contact-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: white;
    border-radius: 14px;
    padding: 20px 24px;
    box-shadow: 0 2px 12px rgba(0,61,137,0.06);
    transition: all 0.25s;
    text-decoration: none;
    color: inherit;
  }
  .contact-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,61,137,0.12); }
  .contact-card-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(0,61,137,0.25);
  }
  .contact-card-text strong { display: block; font-size: 13px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .contact-card-text span { font-size: 15px; font-weight: 600; color: var(--dark); }
  .contact-form-wrap {
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 8px 40px rgba(0,61,137,0.08);
  }
  .contact-form-wrap h3 {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 8px;
  }
  .contact-form-wrap p { font-size: 0.9rem; color: var(--gray-500); margin-bottom: 28px; }
  .form-group { margin-bottom: 18px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group label { display: block; font-size: 12.5px; font-weight: 600; color: var(--gray-700); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.4px; }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--gray-200);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--dark);
    background: var(--gray-100);
    transition: all 0.2s;
    outline: none;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(0,61,137,0.08); }
  .form-group textarea { resize: vertical; min-height: 110px; }
  .form-submit {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    padding: 15px 32px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 6px 24px rgba(0,61,137,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .form-submit:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 10px 30px rgba(0,61,137,0.4); }

  /* ── MAP HINT ── */
  .map-hint {
    margin-top: 20px;
    background: white;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,61,137,0.06);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .map-hint-icon { font-size: 28px; flex-shrink: 0; }
  .map-hint-text strong { display: block; font-size: 13px; font-weight: 700; color: var(--dark); }
  .map-hint-text span { font-size: 12.5px; color: var(--gray-500); }
  .map-hint a { display: inline-block; margin-top: 6px; font-size: 13px; font-weight: 600; color: var(--primary); text-decoration: none; }
  .map-hint a:hover { text-decoration: underline; }

  /* ── FOOTER ── */
  .footer {
    background: #0a0f1e;
    color: rgba(255,255,255,0.7);
    padding: 64px 32px 32px;
  }
  .footer-grid {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 48px;
    padding-bottom: 48px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .footer-brand .logo-wrap { margin-bottom: 16px; }
  .footer-brand .logo-wrap .logo-text strong { color: white; }
  .footer-brand .logo-wrap .logo-text small { color: rgba(255,255,255,0.4); }
  .footer-brand p { font-size: 13.5px; line-height: 1.7; max-width: 280px; }
  .footer-col h4 { color: white; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 18px; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
