<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIS Elektro GmbH – Ihr Elektriker für Erding, Freising und München</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00F2EA;
    --orange: #FFA133;
    --dark: #0d1117;
    --dark2: #161b22;
    --dark3: #1c2330;
    --gray: #8b949e;
    --light: #f0f6fc;
    --white: #ffffff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--light);
    overflow-x: hidden;
  }

  /* ─── INFO BAR ─── */
  .info-bar {
    background: #070a0e;
    border-bottom: 1px solid rgba(0,242,234,0.2);
    padding: 8px 0;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--gray);
    overflow: hidden;
    white-space: nowrap;
  }
  .info-bar-inner {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    padding: 0 20px;
  }
  .info-bar span { display: inline-flex; align-items: center; gap: 6px; }
  .info-bar .highlight { color: var(--cyan); }
  .info-bar .star { color: var(--orange); }

  /* ─── WATERMARK ─── */
  .watermark-bar {
    background: linear-gradient(90deg, #1a1200, #2a1e00, #1a1200);
    border-bottom: 1px solid rgba(255,161,51,0.3);
    padding: 6px 20px;
    text-align: center;
    font-size: 10px;
    color: rgba(255,161,51,0.7);
    letter-spacing: 0.8px;
    font-weight: 500;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(13,17,23,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,242,234,0.15);
    padding: 0 40px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.3s ease;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }
  .logo-placeholder {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--cyan), #00bdb6);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: var(--dark);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: -1px;
    flex-shrink: 0;
  }
  .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
  .logo-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 1px;
  }
  .logo-name span { color: var(--cyan); }
  .logo-sub { font-size: 10px; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; }

  nav { display: flex; align-items: center; gap: 6px; }
  nav a {
    color: var(--gray);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 6px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  nav a:hover { color: var(--white); background: rgba(255,255,255,0.06); }
  .nav-cta {
    background: var(--cyan) !important;
    color: var(--dark) !important;
    font-weight: 700 !important;
    margin-left: 8px;
    padding: 9px 18px !important;
  }
  .nav-cta:hover { background: #00d4cd !important; transform: translateY(-1px); }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://tiselektro.de/wp-content/uploads/2023/01/TIS-GMBH-03-1500x630.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    transform: scale(1.05);
    transition: transform 8s ease;
  }
  .hero:hover .hero-bg { transform: scale(1.0); }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg,
      rgba(13,17,23,0.92) 0%,
      rgba(13,17,23,0.75) 50%,
      rgba(0,242,234,0.08) 100%);
  }
  .hero-grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,242,234,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,242,234,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    padding: 120px 40px 80px;
    width: 100%;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,242,234,0.1);
    border: 1px solid rgba(0,242,234,0.3);
    color: var(--cyan);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 28px;
  }
  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.5); }
  }

  .hero h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 800;
    line-height: 0.95;
    color: var(--white);
    margin-bottom: 8px;
    letter-spacing: -1px;
  }
  .hero h1 .accent { color: var(--orange); display: block; }
  .hero h1 .sub-title {
    font-size: clamp(24px, 4vw, 44px);
    color: var(--cyan);
    font-weight: 600;
    display: block;
    margin-top: 6px;
  }

  .hero-desc {
    max-width: 560px;
    font-size: 16px;
    line-height: 1.7;
    color: rgba(240,246,252,0.75);
    margin: 28px 0 44px;
  }

  .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 60px; }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--cyan);
    color: var(--dark);
    padding: 16px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.3s;
    letter-spacing: 0.3px;
    box-shadow: 0 0 30px rgba(0,242,234,0.3);
  }
  .btn-primary:hover {
    background: #00d4cd;
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(0,242,234,0.4);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--white);
    padding: 16px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    gap: 48px;
    flex-wrap: wrap;
  }
  .hero-stat { display: flex; flex-direction: column; }
  .hero-stat .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--orange);
    line-height: 1;
  }
  .hero-stat .label { font-size: 12px; color: var(--gray); letter-spacing: 0.5px; margin-top: 4px; }

  /* ─── FLOATING CTAs ─── */
  .floating-ctas {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 900;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .float-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .float-call {
    background: var(--cyan);
    color: var(--dark);
  }
  .float-call:hover { background: #00d4cd; transform: translateX(-4px); box-shadow: 0 8px 30px rgba(0,242,234,0.4); }
  .float-mail {
    background: var(--dark3);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
  }
  .float-mail:hover { background: var(--dark2); transform: translateX(-4px); border-color: var(--orange); }

  /* ─── SECTIONS ─── */
  section { padding: 100px 0; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 12px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 800;
    color: var(--white);
    line-height: 1.05;
    margin-bottom: 20px;
  }
  .section-title .accent { color: var(--orange); }
  .section-desc {
    font-size: 16px;
    line-height: 1.7;
    color: var(--gray);
    max-width: 600px;
  }

  /* ─── ÜBER UNS ─── */
  .about { background: var(--dark2); }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .about-img-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
  }
  .about-img-wrap img {
    width: 100%;
    height: 480px;
    object-fit: cover;
    display: block;
    border-radius: 16px;
    transition: transform 0.5s ease;
  }
  .about-img-wrap:hover img { transform: scale(1.03); }
  .about-img-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 1px solid rgba(0,242,234,0.2);
    pointer-events: none;
  }
  .about-img-badge {
    position: absolute;
    bottom: 24px;
    left: 24px;
    background: var(--dark);
    border: 1px solid rgba(0,242,234,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    backdrop-filter: blur(10px);
  }
  .about-img-badge .big { font-size: 32px; font-weight: 800; color: var(--cyan); font-family: 'Barlow Condensed', sans-serif; line-height: 1; }
  .about-img-badge .small { font-size: 11px; color: var(--gray); margin-top: 2px; }

  .about-points { margin-top: 32px; display: flex; flex-direction: column; gap: 16px; }
  .about-point {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    background: rgba(0,242,234,0.04);
    border-left: 3px solid var(--cyan);
    border-radius: 0 8px 8px 0;
  }
  .about-point-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .about-point-text { font-size: 14px; color: rgba(240,246,252,0.8); line-height: 1.5; }

  .about-regions {
    margin-top: 28px;
    padding: 20px;
    background: rgba(255,161,51,0.08);
    border: 1px solid rgba(255,161,51,0.2);
    border-radius: 10px;
  }
  .about-regions-title { font-size: 12px; font-weight: 700; color: var(--orange); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .about-regions-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .region-tag {
    background: rgba(255,161,51,0.1);
    border: 1px solid rgba(255,161,51,0.25);
    color: rgba(240,246,252,0.8);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 100px;
    font-weight: 500;
  }

  /* ─── LEISTUNGEN ─── */
  .services { background: var(--dark); }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 56px;
  }
  .service-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 32px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--cyan), var(--orange));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }
  .service-card:hover::before { transform: scaleX(1); }
  .service-card:hover {
    border-color: rgba(0,242,234,0.2);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    background: var(--dark3);
  }
  .service-icon {
    width: 56px; height: 56px;
    background: rgba(0,242,234,0.1);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 20px;
    transition: all 0.3s;
  }
  .service-card:hover .service-icon {
    background: rgba(0,242,234,0.18);
    transform: scale(1.1);
  }
  .service-card h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .service-card p {
    font-size: 14px;
    color: var(--gray);
    line-height: 1.65;
  }
  .service-tag {
    display: inline-block;
    margin-top: 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--cyan);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ─── GALERIE ─── */
  .gallery { background: var(--dark2); padding: 80px 0; }
  .gallery-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    grid-template-rows: 240px 240px;
    gap: 12px;
    margin-top: 40px;
    border-radius: 16px;
    overflow: hidden;
  }
  .gallery-item { overflow: hidden; position: relative; }
  .gallery-item:first-child { grid-row: span 2; }
  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
    display: block;
  }
  .gallery-item:hover img { transform: scale(1.06); }
  .gallery-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .gallery-item:hover::after { opacity: 1; }

  /* ─── WARUM WIR ─── */
  .why { background: var(--dark); }
  .why-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-top: 56px;
  }
  .why-card {
    text-align: center;
    padding: 36px 24px;
    background: var(--dark2);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.3s;
  }
  .why-card:hover {
    border-color: rgba(255,161,51,0.3);
    transform: translateY(-4px);
    box-shadow: 0 16px 50px rgba(0,0,0,0.25);
  }
  .why-icon { font-size: 40px; margin-bottom: 16px; display: block; }
  .why-card h4 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 10px;
  }
  .why-card p { font-size: 13px; color: var(--gray); line-height: 1.6; }

  /* ─── RATING ─── */
  .rating-bar {
    background: linear-gradient(135deg, #0d1117, #161b22);
    border-top: 1px solid rgba(0,242,234,0.1);
    border-bottom: 1px solid rgba(0,242,234,0.1);
    padding: 40px 0;
  }
  .rating-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    flex-wrap: wrap;
  }
  .rating-score {
    text-align: center;
  }
  .rating-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 64px;
    font-weight: 800;
    color: var(--orange);
    line-height: 1;
  }
  .rating-stars { font-size: 20px; margin: 4px 0; letter-spacing: 2px; }
  .rating-count { font-size: 12px; color: var(--gray); }
  .rating-divider { width: 1px; height: 80px; background: rgba(255,255,255,0.08); }
  .rating-text { max-width: 320px; }
  .rating-text h3 { font-size: 22px; font-weight: 700; color: var(--white); margin-bottom: 8px; }
  .rating-text p { font-size: 14px; color: var(--gray); line-height: 1.6; }
  .rating-google { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .google-badge {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--gray);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ─── KONTAKT ─── */
  .contact { background: var(--dark2); }
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: start;
  }
  .contact-info { display: flex; flex-direction: column; gap: 20px; }
  .contact-item {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding: 24px;
    background: var(--dark);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.3s;
    text-decoration: none;
    color: inherit;
  }
  .contact-item:hover {
    border-color: rgba(0,242,234,0.2);
    transform: translateX(4px);
  }
  .contact-icon {
    width: 48px; height: 48px;
    background: rgba(0,242,234,0.1);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .contact-item-body {}
  .contact-item-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 4px; }
  .contact-item-value { font-size: 16px; color: var(--white); font-weight: 600; }
  .contact-item-sub { font-size: 12px; color: var(--gray); margin-top: 2px; }

  .contact-form { display: flex; flex-direction: column; gap: 16px; }
  .contact-form h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 8px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--gray); letter-spacing: 0.5px; }
  .form-group input,
  .form-group textarea,
  .form-group select {
    background: var(--dark);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--white);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    outline: none;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,242,234,0.1);
  }
  .form-group textarea { height: 120px; resize: vertical; }
  .form-submit {
    background: var(--cyan);
    color: var(--dark);
    border: none;
    padding: 14px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Inter', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
  }
  .form-submit:hover { background: #00d4cd; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,242,234,0.3); }

  /* ─── FOOTER ─── */
  footer {
    background: #070a0e;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 60px 0 0;
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 48px;
    margin-bottom: 48px;
  }
  .footer-brand {}
  .footer-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .footer-logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--cyan), #00bdb6);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
    color: var(--dark);
    font-family: 'Barlow Condensed', sans-serif;
  }
  .footer-logo-text { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--white); }
