<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF-Elektrotechnik - Elektriker in Germering bei München</title>
<meta name="description" content="SF-Elektrotechnik - Elektroinstallationen für Neubau, Altbau und Erweiterungen. Beleuchtungstechnik, Videoüberwachung, Smart Home, Elektromobilität, Photovoltaik.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #65BC7B;
    --accent: #3DAA35;
    --dark: #0f1a12;
    --dark2: #1a2e1e;
    --dark3: #243328;
    --light: #f4faf5;
    --text: #1c2b1f;
    --text-light: #4a6350;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(61,170,53,0.13);
    --shadow-lg: 0 8px 48px rgba(61,170,53,0.18);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: var(--white);
    overflow-x: hidden;
  }

  /* ─── INFO BAR ─── */
  .info-bar {
    background: var(--dark);
    color: #a8d4b0;
    font-size: 11.5px;
    font-weight: 500;
    padding: 7px 0;
    text-align: center;
    letter-spacing: 0.04em;
    position: relative;
    z-index: 1000;
    border-bottom: 1px solid #2a3d2e;
  }
  .info-bar span { margin: 0 14px; }
  .info-bar .rating { color: #f5c842; }
  .info-bar a { color: #65BC7B; text-decoration: none; }
  .info-bar a:hover { text-decoration: underline; }

  /* ─── WATERMARK BANNER ─── */
  .watermark-banner {
    background: linear-gradient(90deg, #1a2e1e 0%, #243328 50%, #1a2e1e 100%);
    color: #7ecf8a;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 0;
    text-align: center;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid #3DAA35;
    position: relative;
    z-index: 1000;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 999;
    background: rgba(15, 26, 18, 0.97);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    border-bottom: 1px solid rgba(101,188,123,0.15);
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .header-logo img {
    height: 42px;
    width: auto;
    object-fit: contain;
  }
  .logo-fallback {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
  }
  .logo-text-wrap { display: flex; flex-direction: column; }
  .logo-name { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 800; color: var(--white); line-height: 1.1; }
  .logo-sub { font-size: 10px; color: var(--primary); font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }

  .nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav a {
    color: #c8e6cc;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    transition: all 0.2s ease;
    letter-spacing: 0.01em;
  }
  .nav a:hover { color: var(--primary); background: rgba(101,188,123,0.1); }
  .nav .nav-cta {
    background: var(--primary);
    color: var(--dark) !important;
    font-weight: 700;
    padding: 9px 20px;
    border-radius: 10px;
    margin-left: 8px;
  }
  .nav .nav-cta:hover { background: var(--accent); color: white !important; }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://sf-elektrotechnik.com/wp-content/uploads/2023/09/Stephan-Fottner-Elektroinstallation.jpg');
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
    transform: scale(1.03);
    transition: transform 8s ease;
  }
  .hero:hover .hero-bg { transform: scale(1.0); }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      rgba(10,20,12,0.88) 0%,
      rgba(15,30,18,0.72) 45%,
      rgba(15,30,18,0.35) 100%
    );
  }
  .hero-overlay-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 180px;
    background: linear-gradient(to top, rgba(15,26,18,0.6) 0%, transparent 100%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 760px;
    padding: 0 60px;
    padding-top: 40px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(101,188,123,0.15);
    border: 1px solid rgba(101,188,123,0.35);
    backdrop-filter: blur(8px);
    color: var(--primary);
    font-size: 12.5px;
    font-weight: 700;
    padding: 7px 16px;
    border-radius: 50px;
    margin-bottom: 26px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .hero-badge-dot {
    width: 8px; height: 8px;
    background: var(--primary);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .hero h1 {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }
  .hero h1 span { color: var(--primary); }

  .hero-sub {
    font-size: clamp(16px, 1.8vw, 20px);
    color: #b8d8be;
    line-height: 1.6;
    margin-bottom: 18px;
    font-weight: 400;
    max-width: 580px;
  }

  .hero-location {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #8bc997;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 36px;
  }

  .hero-btns {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: var(--primary);
    color: var(--dark);
    font-weight: 700;
    font-size: 15px;
    padding: 15px 30px;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(101,188,123,0.35);
    border: none;
    cursor: pointer;
  }
  .btn-primary:hover {
    background: var(--accent);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(61,170,53,0.45);
  }
  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: rgba(255,255,255,0.08);
    color: white;
    font-weight: 700;
    font-size: 15px;
    padding: 15px 30px;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.25s ease;
    border: 2px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(8px);
    cursor: pointer;
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.15);
    border-color: var(--primary);
    color: var(--primary);
    transform: translateY(-2px);
  }

  .hero-stats {
    position: absolute;
    bottom: 50px;
    right: 60px;
    display: flex;
    gap: 16px;
    z-index: 2;
  }
  .hero-stat {
    background: rgba(15,26,18,0.75);
    border: 1px solid rgba(101,188,123,0.25);
    backdrop-filter: blur(12px);
    padding: 16px 22px;
    border-radius: 14px;
    text-align: center;
  }
  .hero-stat-num {
    font-family: 'Poppins', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--primary);
    line-height: 1;
  }
  .hero-stat-label { font-size: 11px; color: #8bc997; font-weight: 600; margin-top: 4px; letter-spacing: 0.05em; }

  .hero-scroll {
    position: absolute;
    bottom: 30px;
    left: 60px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #6aad78;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, #65BC7B, transparent);
    animation: scrollLine 2s infinite;
  }
  @keyframes scrollLine {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ─── SECTION GENERAL ─── */
  section { padding: 90px 40px; }

  .container { max-width: 1200px; margin: 0 auto; }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .section-label::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }

  .section-title {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 800;
    color: var(--text);
    line-height: 1.15;
    letter-spacing: -0.02em;
  }
  .section-title span { color: var(--accent); }

  .section-desc {
    font-size: 17px;
    color: var(--text-light);
    line-height: 1.7;
    margin-top: 14px;
    max-width: 600px;
  }

  /* ─── FEATURES BAR ─── */
  .features-bar {
    background: var(--dark);
    padding: 28px 40px;
    position: relative;
    overflow: hidden;
  }
  .features-bar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
  }
  .features-bar-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .feature-item {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #c8e6cc;
    font-size: 14px;
    font-weight: 600;
  }
  .feature-icon {
    width: 40px;
    height: 40px;
    background: rgba(101,188,123,0.12);
    border: 1px solid rgba(101,188,123,0.25);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .feature-divider {
    width: 1px;
    height: 40px;
    background: rgba(101,188,123,0.15);
  }

  /* ─── ÜBER UNS ─── */
  .about-section {
    background: var(--light);
    position: relative;
    overflow: hidden;
  }
  .about-section::before {
    content: '';
    position: absolute;
    top: -80px;
    right: -80px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(101,188,123,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .about-img-wrap {
    position: relative;
  }
  .about-img-main {
    width: 100%;
    height: 520px;
    object-fit: cover;
    border-radius: 20px;
    display: block;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .about-img-badge {
    position: absolute;
    bottom: -24px;
    right: -24px;
    background: var(--primary);
    color: var(--dark);
    padding: 22px 26px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(101,188,123,0.4);
  }
  .about-img-badge-num {
    font-family: 'Poppins', sans-serif;
    font-size: 34px;
    font-weight: 900;
    line-height: 1;
    color: var(--dark);
  }
  .about-img-badge-text { font-size: 12px; font-weight: 700; color: rgba(15,26,18,0.75); margin-top: 4px; }

  .about-img-card {
    position: absolute;
    top: 30px;
    left: -30px;
    background: var(--dark);
    border: 1px solid rgba(101,188,123,0.2);
    padding: 14px 18px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .about-img-card-icon { font-size: 24px; }
  .about-img-card-text { font-size: 12px; font-weight: 700; color: var(--primary); }
  .about-img-card-sub { font-size: 11px; color: #5a7a62; }

  .about-content {}
  .about-points { margin-top: 32px; display: flex; flex-direction: column; gap: 18px; }
  .about-point {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .about-point-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, rgba(101,188,123,0.12), rgba(61,170,53,0.08));
    border: 1px solid rgba(101,188,123,0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .about-point-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .about-point-text { font-size: 14px; color: var(--text-light); line-height: 1.6; }

  .about-cta { margin-top: 36px; }

  /* ─── LEISTUNGEN ─── */
  .services-section {
    background: var(--white);
    position: relative;
    overflow: hidden;
  }
  .services-section::after {
    content: '';
    position: absolute;
    bottom: -100px;
    left: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(61,170,53,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .services-header { margin-bottom: 54px; }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .service-card {
    background: var(--white);
    border: 1px solid #e4f0e6;
    border-radius: 20px;
    padding: 34px 28px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }
  .service-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(61,170,53,0.12);
    border-color: rgba(101,188,123,0.3);
  }
  .service-card:hover::before { transform: scaleX(1); }

  .service-card-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, rgba(101,188,123,0.12), rgba(61,170,53,0.06));
    border: 1px solid rgba(101,188,123,0.2);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 20px;
    transition: all 0.3s ease;
  }
  .service-card:hover .service-card-icon {
    background: linear-gradient(135deg, rgba(101,188,123,0.2), rgba(61,170,53,0.12));
    transform: scale(1.08);
  }
  .service-card-title {
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
  }
  .service-card-text {
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.65;
  }
  .service-card-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    margin-top: 18px;
    text-decoration: none;
    transition: gap 0.2s ease;
  }
  .service-card:hover .service-card-link { gap: 10px; }

  /* ─── GALLERY ─── */
  .gallery-section { background: var(--dark); padding: 80px 40px; }
  .gallery-section .section-title { color: var(--white); }
  .gallery-section .section-label { color: var(--primary); }
  .gallery-section .section-label::before { background: var(--primary); }

  .gallery-grid {
    margin-top: 48px;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    grid-template-rows: 280px 280px;
    gap: 16px;
  }
  .gallery-item {
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .gallery-item:first-child { grid-row: span 2; }
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
    display: block;
  }
  .gallery-item:hover img { transform: scale(1.05); }
  .gallery-item-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,20,12,0.7) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    align-items: flex-end;
    padding: 20px;
  }
  .gallery-item:hover .gallery-item-overlay { opacity: 1; }
  .gallery-item-label {
    color: var(--primary);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ─── WHY US ─── */
  .why-section { background: var(--light); }
  .why-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: start;
    margin-top: 56px;
  }
  .why-cards { display: flex; flex-direction: column; gap: 18px; }
  .why-card {
    background: var(--white);
    border: 1px solid #e4f0e6;
    border-radius: 16px;
    padding: 24px 26px;
    display: flex;
    gap: 18px;
    align-items: flex-start;
    transition: all 0.25s ease;
  }
  .why-card:hover {
    box-shadow: 0 8px 30px rgba(61,170,53,0.1);
    border-color: rgba(101,188,123,0.3);
    transform: translateX(4px);
  }
  .why-card-num {
    font-family: 'Poppins', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: rgba(101,188,123,0.2);
    line-height: 1;
    flex-shrink: 0;
    width: 44px;
  }
  .why-card-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .why-card-text { font-size: 14px; color: var(--text-light); line-height: 1.6; }

  .why-visual {
    position: sticky;
    top: 100px;
  }
  .why-img {
    width: 100%;
    height: 380px;
    object-fit: cover;
    border-radius: 20px;
    display: block;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  }
  .why-rating-card {
    background: var(--dark);
    border: 1px solid rgba(101,188,123,0.2);
    border-radius: 16px;
    padding: 22px 26px;
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .why-rating-stars { font-size: 22px; letter-spacing: 2px; color: #f5c842; }
  .why-rating-num { font-family: 'Poppins', sans-serif; font-size: 30px; font-weight: 900; color: var(--white); }
  .why-rating-text { font-size: 13px; color: #7aaa82; font-weight: 600; margin-top: 2px; }

  /* ─── KONTAKT ─── */
  .contact-section {
    background: var(--dark);
    position: relative;
    overflow: hidden;
  }
  .contact-section::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(101,188,123,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .contact-section .section-title { color: var(--white); }
  .contact-section .section-label { color: var(--primary); }
  .contact-section .section-label::before { background: var(--primary); }
  .contact-section .section-desc { color: #7aaa82; }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    margin-top: 54px;
    align-items: start;
  }

  .contact-cards { display: flex; flex-direction: column; gap: 16px; }
  .contact-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(101,188,123,0.15);
    border-radius: 16px;
    padding: 22px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: all 0.25s ease;
    text-decoration: none;
  }
  .contact-card:hover {
    background: rgba(101,188,123,0.07);
