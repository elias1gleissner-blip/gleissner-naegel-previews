<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mit uns fließt der Strom » ERS - Elektrotechnik GmbH</title>
<meta name="description" content="Als moderner, kompetenter und flexibler Handwerksbetrieb im Bereich Elektroinstallation legen wir großen Wert auf familiäre Werte und zukunftsorientierte Lösungen.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #6EC1E4;
    --accent: #FFA648;
    --dark: #0d1b2a;
    --dark2: #1a2e42;
    --mid: #2c4a63;
    --light: #f4f8fb;
    --white: #ffffff;
    --gray: #6b7a8a;
    --gray-light: #e8eef3;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--white);
    color: var(--dark);
    overflow-x: hidden;
  }

  /* ═══════════════════════════════════════
     WATERMARK BANNER
  ═══════════════════════════════════════ */
  .watermark-banner {
    background: repeating-linear-gradient(
      -45deg,
      #1a1a1a,
      #1a1a1a 10px,
      #222 10px,
      #222 20px
    );
    color: rgba(255,255,255,0.7);
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 7px 20px;
    border-bottom: 2px solid var(--accent);
    position: relative;
    z-index: 1000;
  }

  .watermark-banner span {
    background: rgba(0,0,0,0.4);
    padding: 2px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,166,72,0.3);
  }

  /* ═══════════════════════════════════════
     INFO BAR
  ═══════════════════════════════════════ */
  .info-bar {
    background: var(--dark);
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.3px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(110,193,228,0.2);
  }

  .info-bar-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .info-bar-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .info-bar-item .label {
    color: var(--primary);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 1px;
  }

  .info-bar-item a {
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    transition: color 0.2s;
  }

  .info-bar-item a:hover { color: var(--primary); }

  .stars { color: var(--accent); letter-spacing: 1px; }

  .info-bar-sep {
    color: rgba(255,255,255,0.2);
    font-size: 16px;
  }

  /* ═══════════════════════════════════════
     HEADER
  ═══════════════════════════════════════ */
  .header {
    background: rgba(13, 27, 42, 0.97);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 900;
    border-bottom: 2px solid rgba(110,193,228,0.15);
    box-shadow: 0 2px 30px rgba(0,0,0,0.3);
  }

  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }

  .logo-wrap img {
    height: 44px;
    width: auto;
    object-fit: contain;
    filter: brightness(1.1);
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .logo-text .name {
    font-size: 16px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 0.5px;
  }

  .logo-text .sub {
    font-size: 11px;
    color: var(--primary);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  nav a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 6px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  nav a:hover {
    color: var(--white);
    background: rgba(110,193,228,0.12);
  }

  .nav-cta {
    background: var(--primary) !important;
    color: var(--dark) !important;
    font-weight: 700 !important;
    padding: 10px 20px !important;
    margin-left: 8px;
  }

  .nav-cta:hover {
    background: #5aade0 !important;
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(110,193,228,0.4);
  }

  /* ═══════════════════════════════════════
     HERO
  ═══════════════════════════════════════ */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://ers-elektrotechnik.de/wp-content/uploads/2022/08/IMG_3060-round-scaled.webp');
    background-size: cover;
    background-position: center top;
    transform: scale(1.05);
    transition: transform 8s ease;
  }

  .hero:hover .hero-bg {
    transform: scale(1.0);
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      rgba(13,27,42,0.92) 0%,
      rgba(13,27,42,0.75) 50%,
      rgba(13,27,42,0.3) 100%
    );
  }

  .hero-overlay-2 {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(13,27,42,0.6) 0%,
      transparent 50%
    );
  }

  /* Electric line decoration */
  .hero-electric {
    position: absolute;
    top: 0;
    right: 0;
    width: 40%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(110,193,228,0.04) 100%
    );
    clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%);
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1280px;
    margin: 0 auto;
    padding: 80px 24px;
    width: 100%;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(110,193,228,0.15);
    border: 1px solid rgba(110,193,228,0.35);
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 50px;
    margin-bottom: 28px;
    backdrop-filter: blur(8px);
  }

  .hero-badge::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--primary);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero-headline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(52px, 8vw, 110px);
    font-weight: 800;
    line-height: 0.9;
    color: var(--white);
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: -1px;
  }

  .hero-headline .accent {
    color: var(--accent);
    display: block;
    -webkit-text-stroke: 1px var(--accent);
  }

  .hero-headline .highlight {
    color: var(--primary);
  }

  .hero-sub {
    font-size: 18px;
    color: rgba(255,255,255,0.8);
    max-width: 540px;
    line-height: 1.65;
    margin-bottom: 40px;
    font-weight: 400;
  }

  .hero-sub strong {
    color: var(--white);
    font-weight: 600;
  }

  .hero-ctas {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 56px;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--primary);
    color: var(--dark);
    font-size: 15px;
    font-weight: 700;
    padding: 16px 32px;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.25s;
    border: 2px solid var(--primary);
    letter-spacing: 0.3px;
  }

  .btn-primary:hover {
    background: transparent;
    color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(110,193,228,0.35);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--white);
    font-size: 15px;
    font-weight: 600;
    padding: 16px 32px;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.25s;
    border: 2px solid rgba(255,255,255,0.35);
    letter-spacing: 0.3px;
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--white);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
  }

  .hero-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .hero-stat .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 38px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .hero-stat .desc {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .hero-stat-divider {
    width: 1px;
    height: 48px;
    background: rgba(255,255,255,0.15);
    align-self: center;
  }

  /* Scroll indicator */
  .scroll-indicator {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 2;
  }

  .scroll-mouse {
    width: 22px;
    height: 36px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 11px;
    position: relative;
  }

  .scroll-mouse::after {
    content: '';
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 8px;
    background: var(--primary);
    border-radius: 2px;
    animation: scrollDown 2s infinite;
  }

  @keyframes scrollDown {
    0% { top: 5px; opacity: 1; }
    100% { top: 18px; opacity: 0; }
  }

  /* ═══════════════════════════════════════
     ÜBER UNS
  ═══════════════════════════════════════ */
  .section {
    padding: 100px 0;
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 16px;
  }

  .section-label::before {
    content: '';
    display: block;
    width: 30px;
    height: 2px;
    background: var(--primary);
  }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(36px, 5vw, 60px);
    font-weight: 800;
    line-height: 1.05;
    text-transform: uppercase;
    color: var(--dark);
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }

  .section-title .ac {
    color: var(--accent);
  }

  .about {
    background: var(--light);
    position: relative;
    overflow: hidden;
  }

  .about::before {
    content: 'ERS';
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 300px;
    font-weight: 900;
    color: rgba(110,193,228,0.05);
    line-height: 1;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: -10px;
  }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .about-image-wrap {
    position: relative;
  }

  .about-image-main {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 80px rgba(13,27,42,0.2);
  }

  .about-image-main img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
  }

  .about-image-main:hover img {
    transform: scale(1.03);
  }

  .about-image-badge {
    position: absolute;
    bottom: -24px;
    right: -24px;
    background: var(--dark);
    color: var(--white);
    padding: 24px 28px;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    border: 1px solid rgba(110,193,228,0.2);
  }

  .about-image-badge .big {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    display: block;
  }

  .about-image-badge .small {
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-top: 4px;
  }

  .iso-badge {
    position: absolute;
    top: 20px;
    left: 20px;
    background: var(--white);
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  .iso-badge img {
    height: 50px;
    width: auto;
    display: block;
  }

  .about-text p {
    font-size: 16px;
    line-height: 1.75;
    color: #4a5568;
    margin-bottom: 20px;
  }

  .about-text p strong {
    color: var(--dark);
    font-weight: 700;
  }

  .about-features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 32px;
  }

  .about-feature {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--white);
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--gray-light);
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
    transition: all 0.2s;
  }

  .about-feature:hover {
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(110,193,228,0.15);
  }

  .about-feature-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--primary), #4ab0d8);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════
     LEISTUNGEN
  ═══════════════════════════════════════ */
  .services {
    background: var(--white);
    position: relative;
    overflow: hidden;
  }

  .services-header {
    text-align: center;
    margin-bottom: 64px;
  }

  .services-header .section-label {
    justify-content: center;
  }

  .services-header .section-label::before {
    display: none;
  }

  .services-header .section-label::after {
    content: '';
    display: block;
    width: 30px;
    height: 2px;
    background: var(--primary);
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .service-card {
    background: var(--light);
    border-radius: 16px;
    padding: 36px 32px;
    border: 1px solid transparent;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .service-card:hover {
    border-color: rgba(110,193,228,0.3);
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(110,193,228,0.15);
    background: var(--white);
  }

  .service-card:hover::before {
    transform: scaleX(1);
  }

  .service-card-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 72px;
    font-weight: 900;
    color: rgba(110,193,228,0.1);
    line-height: 1;
    position: absolute;
    top: 16px;
    right: 24px;
    transition: color 0.3s;
  }

  .service-card:hover .service-card-num {
    color: rgba(110,193,228,0.18);
  }

  .service-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, rgba(110,193,228,0.15) 0%, rgba(110,193,228,0.05) 100%);
    border: 1px solid rgba(110,193,228,0.25);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 24px;
    transition: all 0.3s;
  }

  .service-card:hover .service-icon {
    background: linear-gradient(135deg, var(--primary), #4ab0d8);
    border-color: transparent;
    transform: scale(1.05) rotate(-3deg);
  }

  .service-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .service-desc {
    font-size: 14px;
    line-height: 1.7;
    color: #6b7a8a;
  }

  .service-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    text-decoration: none;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: gap 0.2s;
  }

  .service-link:hover { gap: 10px; }

  /* ═══════════════════════════════════════
     WARUM WIR
  ═══════════════════════════════════════ */
  .why {
    background: var(--dark);
    position: relative;
    overflow: hidden;
  }

  .why::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(110,193,228,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(255,166,72,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .why-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
    margin-top: 60px;
  }

  .why-item {
    background: rgba(255,255,255,0.02);
    padding: 44px 32px;
    text-align: center;
    transition: background 0.3s;
  }

  .why-item:hover {
    background: rgba(110,193,228,0.07);
  }

  .why-icon {
    font-size: 40px;
    margin-bottom: 20px;
    display: block;
  }

  .why-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }

  .why-label {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .why-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 8px;
    line-height: 1.5;
  }

  .why-header {
    text-align: center;
  }

  .why-header .section-label {
    justify-content: center;
    color: var(--primary);
  }

  .why-header .section-label::before { background: var(--primary); }

  .why-header .section-title {
    color: var(--white);
  }

  .why-header p {
    font-size: 16px;
    color: rgba(255,255,255,0.55);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ═══════════════════════════════════════
     RATING SECTION
  ═══════════════════════════════════════ */
  .rating-section {
    background: linear-gradient(135deg, var(--primary) 0%, #4ab0d8 100%);
    padding: 60px 0;
  }

  .rating-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 32px;
  }

  .rating-text {
    flex: 1;
    min-width: 300px;
  }

  .rating-text h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--white);
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 12px;
  }

  .rating-text p {
    font-size: 16px;
