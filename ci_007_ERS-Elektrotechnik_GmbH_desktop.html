<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERS-Elektrotechnik GmbH – Mit uns fließt der Strom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #6EC1E4;
    --primary-dark: #4aa8cf;
    --accent: #FFA648;
    --dark: #1a1f2e;
    --dark2: #252b3b;
    --mid: #3a4155;
    --light: #f4f8fb;
    --white: #ffffff;
    --gray: #6b7280;
    --gray-light: #e8eef4;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--white);
    color: var(--dark);
    overflow-x: hidden;
  }

  /* ─── INFO BAR ─── */
  .info-bar {
    background: var(--dark);
    color: rgba(255,255,255,0.85);
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 7px 0;
    border-bottom: 2px solid var(--primary);
  }
  .info-bar-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }
  .info-bar span { display: flex; align-items: center; gap: 6px; }
  .info-bar a { color: var(--primary); text-decoration: none; }
  .info-bar .stars { color: #FFD700; }
  .info-bar .divider { color: rgba(255,255,255,0.2); }

  /* ─── WATERMARK ─── */
  .watermark-bar {
    background: linear-gradient(135deg, #1a1f2e 0%, #252b3b 100%);
    border-bottom: 1px solid rgba(110,193,228,0.3);
    text-align: center;
    padding: 6px 16px;
  }
  .watermark-bar p {
    font-size: 10.5px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
    font-weight: 400;
  }
  .watermark-bar strong { color: var(--accent); font-weight: 600; }

  /* ─── HEADER ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(26,31,46,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(110,193,228,0.15);
    transition: box-shadow 0.3s;
  }
  .header.scrolled { box-shadow: 0 4px 30px rgba(0,0,0,0.4); }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .logo-wrap img {
    height: 44px;
    width: auto;
    object-fit: contain;
    filter: brightness(1.1);
  }
  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .logo-text .brand { font-size: 17px; font-weight: 800; color: var(--white); letter-spacing: 0.02em; }
  .logo-text .sub { font-size: 10px; color: var(--primary); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }

  nav { display: flex; align-items: center; gap: 4px; }
  nav a {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 6px;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  nav a:hover { color: var(--white); background: rgba(110,193,228,0.12); }
  .nav-cta {
    background: var(--primary) !important;
    color: var(--dark) !important;
    font-weight: 700 !important;
    padding: 9px 18px !important;
    margin-left: 8px;
  }
  .nav-cta:hover { background: var(--primary-dark) !important; }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    min-height: 92vh;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://ers-elektrotechnik.de/wp-content/uploads/2022/08/IMG_3060-round-scaled.webp');
    background-size: cover;
    background-position: center top;
    transform: scale(1.05);
    transition: transform 8s ease;
  }
  .hero:hover .hero-bg { transform: scale(1.0); }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, rgba(26,31,46,0.93) 0%, rgba(26,31,46,0.75) 50%, rgba(26,31,46,0.35) 100%);
  }
  .hero-accent-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 6px;
    height: 100%;
    background: linear-gradient(to bottom, var(--primary), var(--accent));
  }
  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 24px;
    width: 100%;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(110,193,228,0.15);
    border: 1px solid rgba(110,193,228,0.4);
    color: var(--primary);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 50px;
    margin-bottom: 24px;
  }
  .hero-badge::before { content: '⚡'; font-size: 14px; }
  .hero h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(46px, 7vw, 86px);
    font-weight: 800;
    color: var(--white);
    line-height: 1.0;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .hero h1 .accent-word { color: var(--accent); }
  .hero h1 .primary-word { color: var(--primary); }
  .hero-sub {
    font-size: clamp(16px, 2.2vw, 20px);
    color: rgba(255,255,255,0.75);
    max-width: 560px;
    line-height: 1.7;
    margin-bottom: 40px;
    font-weight: 400;
  }
  .hero-buttons { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--primary);
    color: var(--dark);
    font-weight: 700;
    font-size: 15px;
    padding: 15px 30px;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.25s;
    letter-spacing: 0.01em;
    border: 2px solid var(--primary);
  }
  .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(110,193,228,0.4); }
  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--white);
    font-weight: 600;
    font-size: 15px;
    padding: 15px 30px;
    border-radius: 8px;
    text-decoration: none;
    border: 2px solid rgba(255,255,255,0.35);
    transition: all 0.25s;
  }
  .btn-outline:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.6); transform: translateY(-2px); }

  .hero-stats {
    display: flex;
    gap: 40px;
    margin-top: 56px;
    padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.1);
    flex-wrap: wrap;
  }
  .hero-stat .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 38px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .hero-stat .label { font-size: 12px; color: rgba(255,255,255,0.55); font-weight: 500; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ─── FLOATING CTAs ─── */
  .floating-ctас {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .float-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    white-space: nowrap;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    overflow: hidden;
    max-width: 52px;
  }
  .float-btn:hover { max-width: 220px; }
  .float-btn .icon { font-size: 18px; flex-shrink: 0; }
  .float-btn .text { opacity: 0; transform: translateX(10px); transition: all 0.3s; white-space: nowrap; }
  .float-btn:hover .text { opacity: 1; transform: translateX(0); }
  .float-call { background: var(--primary); color: var(--dark); }
  .float-call:hover { background: var(--primary-dark); box-shadow: 0 6px 28px rgba(110,193,228,0.5); }
  .float-mail { background: var(--dark2); color: var(--white); border: 1px solid rgba(255,255,255,0.1); }
  .float-mail:hover { background: var(--mid); box-shadow: 0 6px 28px rgba(0,0,0,0.4); }

  /* ─── SECTIONS ─── */
  section { padding: 96px 24px; }
  .section-inner { max-width: 1200px; margin: 0 auto; }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 12px;
  }
  .section-label::before { content: ''; display: block; width: 28px; height: 2px; background: var(--primary); }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(32px, 4.5vw, 52px);
    font-weight: 800;
    color: var(--dark);
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .section-title .hl { color: var(--accent); }

  .section-desc {
    font-size: 16.5px;
    color: var(--gray);
    line-height: 1.75;
    max-width: 640px;
  }

  /* ─── ÜBER UNS ─── */
  .about { background: var(--light); }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .about-img-wrap {
    position: relative;
  }
  .about-img {
    width: 100%;
    border-radius: 16px;
    display: block;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  }
  .about-img-badge {
    position: absolute;
    bottom: -20px;
    right: -20px;
    background: var(--dark);
    color: var(--white);
    border-radius: 12px;
    padding: 18px 22px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    border: 3px solid var(--primary);
  }
  .about-img-badge .big { font-family: 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 800; color: var(--accent); line-height: 1; }
  .about-img-badge .sm { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }

  .about-content { padding-right: 20px; }
  .about-text { font-size: 16px; color: var(--gray); line-height: 1.8; margin-top: 20px; }
  .about-text + .about-text { margin-top: 14px; }

  .about-features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 32px;
  }
  .about-feature {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px;
    background: var(--white);
    border-radius: 10px;
    border-left: 3px solid var(--primary);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .about-feature-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
  .about-feature-text .title { font-size: 13px; font-weight: 700; color: var(--dark); }
  .about-feature-text .desc { font-size: 12px; color: var(--gray); margin-top: 2px; }

  .iso-badge {
    margin-top: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--gray-light);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .iso-badge img { height: 52px; width: auto; }
  .iso-badge-text .t { font-size: 13px; font-weight: 700; color: var(--dark); }
  .iso-badge-text .s { font-size: 12px; color: var(--gray); margin-top: 2px; }

  /* ─── LEISTUNGEN ─── */
  .services { background: var(--dark); }
  .services .section-title { color: var(--white); }
  .services .section-desc { color: rgba(255,255,255,0.55); }
  .services .section-label { color: var(--accent); }
  .services .section-label::before { background: var(--accent); }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 52px;
  }
  .service-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 32px 28px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
  .service-card:hover { background: rgba(110,193,228,0.07); border-color: rgba(110,193,228,0.3); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
  .service-card:hover::before { transform: scaleX(1); }
  .service-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, rgba(110,193,228,0.2), rgba(255,166,72,0.1));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 20px;
    border: 1px solid rgba(110,193,228,0.2);
  }
  .service-card h3 { font-size: 17px; font-weight: 700; color: var(--white); margin-bottom: 10px; }
  .service-card p { font-size: 13.5px; color: rgba(255,255,255,0.5); line-height: 1.7; }
  .service-num {
    position: absolute;
    top: 20px;
    right: 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    font-weight: 800;
    color: rgba(255,255,255,0.04);
    line-height: 1;
  }

  /* ─── WHY US ─── */
  .why { background: var(--white); }
  .why-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .why-points { margin-top: 32px; display: flex; flex-direction: column; gap: 16px; }
  .why-point {
    display: flex;
    gap: 16px;
    padding: 20px;
    border-radius: 12px;
    transition: background 0.2s;
  }
  .why-point:hover { background: var(--light); }
  .why-point-num {
    width: 36px;
    height: 36px;
    background: var(--primary);
    color: var(--dark);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    flex-shrink: 0;
  }
  .why-point-content .t { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
  .why-point-content .d { font-size: 13.5px; color: var(--gray); line-height: 1.65; }

  .why-visual {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .rating-card {
    background: var(--dark);
    border-radius: 16px;
    padding: 32px;
    color: var(--white);
    text-align: center;
    box-shadow: 0 20px 60px rgba(26,31,46,0.15);
  }
  .rating-card .stars { font-size: 28px; letter-spacing: 4px; margin-bottom: 10px; }
  .rating-card .score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 64px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .rating-card .label { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }

  .info-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .info-card {
    background: var(--light);
    border-radius: 12px;
    padding: 20px;
    border-bottom: 3px solid var(--primary);
  }
  .info-card .ic { font-size: 26px; margin-bottom: 8px; }
  .info-card .it { font-size: 13px; font-weight: 700; color: var(--dark); }
  .info-card .id { font-size: 12px; color: var(--gray); margin-top: 3px; }

  /* ─── KONTAKT ─── */
  .contact { background: var(--light); }
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: start;
  }
  .contact-info { padding-right: 20px; }
  .contact-items { display: flex; flex-direction: column; gap: 20px; margin-top: 36px; }
  .contact-item {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    padding: 22px;
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
    transition: box-shadow 0.2s;
    text-decoration: none;
  }
  .contact-item:hover { box-shadow: 0 6px 30px rgba(110,193,228,0.2); }
  .contact-item-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .contact-item-text .label { font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.06em; }
  .contact-item-text .value { font-size: 16px; font-weight: 700; color: var(--dark); margin-top: 3px; }
  .contact-item-text .sub { font-size: 12px; color: var(--gray); margin-top: 2px; }

  .contact-form-wrap {
    background: var(--white);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.07);
  }
  .contact-form-wrap h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 6px;
  }
  .contact-form-wrap p { font-size: 14px; color: var(--gray); margin-bottom: 28px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--dark); text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input,
  .form-group textarea,
  .form-group select {
    padding: 12px 16px;
    border: 1.5px solid var(--gray-light);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--dark);
    background: var(--light);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    resize: vertical;
  }
  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(110,193,228,0.15); background: var(--white); }
  .form-group textarea { min-height: 100px; }
  .btn-form {
    width: 100%;
    background: var(--primary);
    color: var(--dark);
    font-weight: 700;
    font-size: 15px;
    padding: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.02em;
    margin-top: 8px;
  }
  .btn-form:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(110,193,228,0.35); }

  /* ─── FOOTER ─── */
  footer {
    background: var(--dark);
    color: rgba(255,255,255,0.6);
    padding: 64px 24px 0;
  }
  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.5fr;
    gap: 48px;
    padding-bottom: 48px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .footer-brand .logo { height: 40px; width: auto; margin-bottom: 16px; filter: brightness(1.1); }
  .footer-brand p { font-size: 13.5px; line-height: 1.75; color: rgba(255,255,255,0.5); }
  .footer-contact-item { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; }
  .footer-contact-item a { color: var(--primary); text-decoration: none; }
  .footer-contact-item a:hover { text-decoration: underline; }

  footer h4 { font-size: 13px; font-weight: 700; color: var(--white); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 20px; }
  footer ul { list-style: none; }
  footer ul li { margin-bottom: 10px; }
  footer ul li a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13.5px; transition: color 0.2s; }
  footer ul li a:hover { color: var(--primary); }

  .footer-bottom {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
  }
  .footer-bottom a { color: rgba(255,255,255,0.4); text-decoration: none; }
